services:
  app:
    build:
      context: .
    container_name: fastapi_beer_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/beerdb"
    volumes:
      - .:/app
  db:
    image: postgres:15
    container_name: postgres_beerdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beerdb
    ports:
      - "5432:5432"
    volumes:
      - beerdb_data:/var/lib/postgresql/data

volumes:
  beerdb_data:
